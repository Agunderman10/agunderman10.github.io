<!DOCTYPE html>
<html>
    <title>Welcome to the Gundernet</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Montserrat">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
    <link rel="stylesheet" href="styles.css">
    
    <body>
        <!-- NavBar -->
        <div class="w3-top" id="myNavbar">
            <div class="w3-bar w3-black w3-opacity w3-hover-opacity-off w3-center">
                <a href="#" class="w3-bar-item w3-button" style="width:25% !important">HOME</a>
                <a href="#about" class="w3-bar-item w3-button" style="width:25% !important">ABOUT</a>
                <a href="#contact" class="w3-bar-item w3-button" style="width:25% !important">CONTACT</a>

            </div>
        </div>
        <!-- End NavBar -->

        <!-- Begin Page Content for large and medium screens -->
        <div class="w3-center sunsetBackground FrontPageHeight w3-hide-small">
            <a>
                <!-- Profile pic for medium and large screens -->
                <img class="w3-circle mouseoverEffect" src="Images/Soccer.jpg" alt="Soccer" 
                style="width:15%; margin-top: 5%;">
            </a>
            <h1 class="MyNameHeader mouseoverEffect" style="margin-top:1%;">ANDREW GUNDERMAN</h1>

        </div>
        <!-- End Page Content for large and medium screens -->

        <!-- Begin Page Content for small screens -->
        <div class="w3-center sunsetBackground FrontPageHeight w3-hide-large w3-hide medium">
            <a>
                <!-- Profile pic for small screens -->
                <img class="w3-circle w3-hide-large w3-hide-medium mouseoverEffect" src="Images/Soccer.jpg" alt="Soccer"
                style="width:35%; margin-top: 15%;">
            </a>
            <h1 class="MyNameHeaderMobile mouseoverEffect" style="margin-top:1%;">ANDREW GUNDERMAN</h1>
            <h1 class="TitleHeaderMobile mouseoverEffect">SOFTWARE DEVELOPER</h1>
        </div>
        <!-- End Page Content for small screens-->
